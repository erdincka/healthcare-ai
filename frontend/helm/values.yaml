replicaCount: 1

image:
  repository: nexusglobal/triageai
  tag: latest
  pullPolicy: Always

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

ezua:
  virtualService:
    endpoint: "healthcare-ai.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"
